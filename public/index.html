
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --status-active: #22c55e;
            --status-inactive: #ef4444;
            --status-lead: #eab308;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            flex: 1;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .customer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .customer-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            animation: fadeIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .customer-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
        }

        .customer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .customer-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 4px 0;
        }

        .customer-id {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active { background: rgba(34, 197, 94, 0.2); color: var(--status-active); }
        .status-inactive { background: rgba(239, 68, 68, 0.2); color: var(--status-inactive); }
        .status-lead { background: rgba(234, 179, 8, 0.2); color: var(--status-lead); }

        .customer-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .detail-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .interactions-section {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: auto;
        }
        
        .interaction-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .interaction-count {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CRM Dashboard</h1>
        </header>

        <div class="dashboard-stats" id="statsContainer">
            <!-- Stats will be injected here -->
        </div>

        <div class="customer-grid" id="customerGrid">
            <div class="loader">Loading your CRM data...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchCustomers();
        });

        async function fetchCustomers() {
            try {
                const response = await fetch('/api/customers');
                const customers = await response.json();
                renderDashboard(customers);
            } catch (error) {
                console.error("Failed to load customers:", error);
                document.getElementById('customerGrid').innerHTML = 
                    `<div class="loader" style="color: var(--status-inactive)">Failed to load data. Ensure the Java server is running.</div>`;
            }
        }

        function renderDashboard(customers) {
            // Calculate Stats
            const total = customers.length;
            const active = customers.filter(c => (c.status || '').toLowerCase() === 'active').length;
            const interactions = customers.reduce((acc, c) => acc + (c.interactions ? c.interactions.length : 0), 0);

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total Customers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--status-active)">${active}</div>
                    <div class="stat-label">Active Clients</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #a78bfa">${interactions}</div>
                    <div class="stat-label">Total Interactions</div>
                </div>
            `;

            // Render Grid
            const grid = document.getElementById('customerGrid');
            grid.innerHTML = '';

            if (customers.length === 0) {
                grid.innerHTML = `<div class="loader">No customers found.</div>`;
                return;
            }

            customers.forEach((c, index) => {
                const safeStatus = (c.status || 'unknown').toLowerCase();
                const statusClass = `status-${safeStatus}`;
                const interactionCount = c.interactions ? c.interactions.length : 0;
                
                const card = document.createElement('div');
                card.className = 'customer-card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="customer-header">
                        <div>
                            <h3 class="customer-name">${c.name}</h3>
                            <span class="customer-id">#${c.id}</span>
                        </div>
                        <span class="status-badge ${statusClass}">${c.status || 'Unknown'}</span>
                    </div>
                    <div class="customer-details">
                        <div class="detail-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            ${c.email}
                        </div>
                        <div class="detail-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            ${c.phone}
                        </div>
                    </div>
                    <div class="interactions-section">
                        <div class="interaction-title">Interactions <span class="interaction-count">${interactionCount}</span></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
